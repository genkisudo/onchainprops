# Regenerates derived site content (index.html blocks, script.js firm data,
# llms.txt) from firms.json + faq.json on every push to main, and commits
# the result back. GitHub Pages then redeploys from the updated branch.
#
# Loop protection: the job skips runs triggered by the bot's own commit,
# and the commit message carries [skip ci] as a second guard.
name: Regenerate from firms.json

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: regenerate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Regenerate generated content
        run: node build.js

      - name: Commit regenerated files if changed
        run: |
          if git diff --quiet; then
            echo "Generated content already up to date."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html script.js llms.txt sitemap.xml
            git commit -m "chore: regenerate site content from firms.json [skip ci]"
            git push
          fi
